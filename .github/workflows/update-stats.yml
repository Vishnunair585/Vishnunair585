name: Update GitHub Stats

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  update-stats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate stats card
        uses: anuraghazra/github-readme-stats@latest
        with:
          username: Vishnunair585
          count_private: true
          show_icons: true
          theme: github_dark
          hide_border: true
        env:
          PAT_1: ${{ secrets.GH_TOKEN }}

      - name: Generate top languages card
        uses: anuraghazra/github-readme-stats@latest
        with:
          username: Vishnunair585
          layout: compact
          theme: github_dark
          hide_border: true
          langs_count: 8
          card_type: top-langs
        env:
          PAT_1: ${{ secrets.GH_TOKEN }}

      - name: Commit updated stats
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"
          git add -A
          git diff --quiet && git diff --staged --quiet || git commit -m "chore: update stats cards [skip ci]"
          git push
